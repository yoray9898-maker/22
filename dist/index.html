<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yoray的卡通計算機</title>
    <style>
        /* 直接將 CSS 寫在這裡，解決 404 檔案找不到的問題 */
        body {
            font-family: '微軟正黑體', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0faff;
            margin-top: 50px;
        }

        h1 {
            color: #ff8fa3;
            text-shadow: 2px 2px 0 #fff;
            margin-bottom: 20px;
        }

        /* 計算機外殼 */
        .calculator-case {
            background-color: #ffffff;
            border: 8px solid #ffcad4;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 10px 0 #ffb3c1, 0 20px 30px rgba(0,0,0,0.1);
            width: 280px;
        }

        /* 顯示螢幕 */
        #display {
            width: 100%;
            height: 70px;
            border: 4px solid #bde0fe;
            border-radius: 15px;
            background-color: #edf6ff;
            font-size: 36px;
            font-weight: bold;
            color: #4a90e2;
            text-align: right;
            padding: 0 15px;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
        }

        /* 按鈕網格佈局 */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        /* 按鈕通用樣式 */
        input[type="button"] {
            width: 100%;
            height: 60px;
            border: none;
            border-radius: 18px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        /* 按鈕點擊動畫 */
        input[type="button"]:active {
            transform: translateY(4px);
            box-shadow: none !important;
        }

        /* 數字按鈕 - 粉藍色 */
        .btn-num {
            background-color: #bde0fe;
            color: white;
            box-shadow: 0 5px 0 #a2d2ff;
        }

        /* 運算符按鈕 - 淺紫色 */
        .btn-op {
            background-color: #cdb4db;
            color: white;
            box-shadow: 0 5px 0 #b392ac;
        }

        /* 等於按鈕 - 亮橘色 */
        .btn-equal {
            background-color: #ffafcc;
            color: white;
            box-shadow: 0 5px 0 #ff8fa3;
        }

        /* 清除與倒退按鈕 - 灰色 */
        .btn-func {
            background-color: #e5e5e5;
            color: #777;
            box-shadow: 0 5px 0 #ccc;
        }

        .span-2 {
            grid-column: span 2;
        }
    </style>
</head>
<body>

    <h1>yoray的卡通計算機</h1>

    <div class="calculator-case">
        <input type="text" id="display" readonly placeholder="0">

        <div class="button-grid">
            <input type="button" value="C" class="btn-func span-2" onclick="clearDisplay()">
            <input type="button" value="<" class="btn-func span-2" onclick="backspace()">

            <input type="button" value="7" class="btn-num" onclick="appendToDisplay('7')">
            <input type="button" value="8" class="btn-num" onclick="appendToDisplay('8')">
            <input type="button" value="9" class="btn-num" onclick="appendToDisplay('9')">
            <input type="button" value="/" class="btn-op" onclick="appendToDisplay('/')">

            <input type="button" value="4" class="btn-num" onclick="appendToDisplay('4')">
            <input type="button" value="5" class="btn-num" onclick="appendToDisplay('5')">
            <input type="button" value="6" class="btn-num" onclick="appendToDisplay('6')">
            <input type="button" value="*" class="btn-op" onclick="appendToDisplay('*')">

            <input type="button" value="1" class="btn-num" onclick="appendToDisplay('1')">
            <input type="button" value="2" class="btn-num" onclick="appendToDisplay('2')">
            <input type="button" value="3" class="btn-num" onclick="appendToDisplay('3')">
            <input type="button" value="-" class="btn-op" onclick="appendToDisplay('-')">

            <input type="button" value="0" class="btn-num" onclick="appendToDisplay('0')">
            <input type="button" value="." class="btn-num" onclick="appendToDisplay('.')">
            <input type="button" value="=" class="btn-equal" onclick="calculate()">
            <input type="button" value="+" class="btn-op" onclick="appendToDisplay('+')">
        </div>
    </div>

    <script>
        const display = document.getElementById("display");

        function appendToDisplay(value) {
            if (display.value === 'Error') display.value = '';
            display.value += value;
        }

        function clearDisplay() {
            display.value = '';
        }

        function backspace() {
            display.value = display.value.slice(0, -1);
        }

        function calculate() {
            try {
                if (display.value === '') return;
                // 執行運算
                let result = eval(display.value);
                // 處理除以 0 的情況
                display.value = isFinite(result) ? result : 'Error';
            } catch (e) {
                display.value = 'Error';
            }
        }
    </script>
</body>
</html>
