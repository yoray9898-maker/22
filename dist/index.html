<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>yoray的卡通簡易計算機</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    
    <h1>yoray的卡通計算機</h1>

    <div class="calculator-case">
        <input type="text" id="display" readonly placeholder="0">

        <div class="button-grid">
            <input type="button" value="1" class="btn-num" onclick="appendToDisplay('1')">
            <input type="button" value="2" class="btn-num" onclick="appendToDisplay('2')">
            <input type="button" value="3" class="btn-num" onclick="appendToDisplay('3')">
            <input type="button" value="+" class="btn-op" onclick="appendToDisplay('+')">

            <input type="button" value="4" class="btn-num" onclick="appendToDisplay('4')">
            <input type="button" value="5" class="btn-num" onclick="appendToDisplay('5')">
            <input type="button" value="6" class="btn-num" onclick="appendToDisplay('6')">
            <input type="button" value="-" class="btn-op" onclick="appendToDisplay('-')">

            <input type="button" value="7" class="btn-num" onclick="appendToDisplay('7')">
            <input type="button" value="8" class="btn-num" onclick="appendToDisplay('8')">
            <input type="button" value="9" class="btn-num" onclick="appendToDisplay('9')">
            <input type="button" value="*" class="btn-op" onclick="appendToDisplay('*')">

            <input type="button" value="0" class="btn-num" onclick="appendToDisplay('0')">
            <input type="button" value="." class="btn-op" onclick="appendToDisplay('.')">
            <input type="button" value="=" class="btn-equal" onclick="calculate()">
            <input type="button" value="/" class="btn-op" onclick="appendToDisplay('/')">

            <input type="button" value="C" class="btn-clear" onclick="clearDisplay()" style="grid-column: span 2; width: auto;">
            <input type="button" value="<" class="btn-back" onclick="backspace()" style="grid-column: span 2; width: auto;" title="倒退鍵">
        </div>
    </div>

    <script>
        // 1. 將數字或運算符加入螢幕
        function appendToDisplay(value) {
            const display = document.getElementById("display");
            // 防止螢幕上顯示 "Error" 時還能繼續輸入
            if (display.value === 'Error') {
                display.value = '';
            }
            display.value += value;
        }

        // 2. 清除所有內容
        function clearDisplay() {
            document.getElementById("display").value = '';
        }

        // 3. 倒退鍵 (刪除最後一個字元)
        function backspace() {
            const display = document.getElementById("display");
            display.value = display.value.toString().slice(0, -1);
        }

        // 4. 計算結果
        function calculate() {
            var expression = document.getElementById("display").value;
            // 如果螢幕是空的，就不執行計算
            if (expression === '') return;

            try {
                // 使用 eval 進行計算，並將結果放回螢幕
                // 為了安全起見，理想上應該用更安全的方式解析字串，但在這個簡易練習中是可以接受的
                let result = eval(expression);
                
                // 處理無限大 (例如除以 0)
                if (!isFinite(result)) {
                    document.getElementById("display").value = 'Error';
                } else {
                    document.getElementById("display").value = result;
                }
            } catch (e) {
                // 如果公式錯誤 (例如打錯符號)，顯示 Error
                document.getElementById("display").value = 'Error';
            }
        }
    </script>
</body>
</html>
